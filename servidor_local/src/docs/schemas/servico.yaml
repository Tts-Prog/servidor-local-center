components:
  schemas:
    Servico:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: "Serviço de limpeza"
        descricao:
          type: string
          example: "Descrição detalhada do serviço"
        categoria:
          type: string
          example: "Limpeza"
        enabled:
          type: boolean
          example: true
        updated_at:
          type: string
          format: date-time
          example: "2023-10-27T10:00:00Z"
        created_at:
          type: string
          format: date-time
          example: "2023-10-27T09:00:00Z"
          
    CreateService:
      type: object
      properties:
        nome:
          type: string
          example: "Serviço de Limpeza"
        descricao:
          type: string
          example: "Descrição detalhada do serviço de limpeza"
        categoria:
          type: string
          example: "Limpeza"
        enabled:
          type: boolean
          example: true
    
    ServiceDetaled:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: "Serviço de limpeza"
        descricao:
          type: string
          example: "Descrição detalhada do serviço"
        designacao_categoria:
          type: string
          example: "Designação do serviço"
        icone_categoria:
          type: string
          example: "Icone do serviço"
        id_empresa:
          type: integer
          example: 1
        designacao_empresa:
          type: string
          example: "Designação da empresa"
        icone_empresa:
          type: string
          example: "Icone da empresa"
        enabled:
          type: boolean
          example: true
        
          
    ResponseSucessoServico:
      type: object
      properties:
        message: 
          type: string
          example: "serviço criado com sucesso"
        status:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/Servico"
          
    ResponseErroServico:
      type: object
      properties: 
        message: 
          type: string
          example: "Erro ao buscar servicos"
        status: 
          type: boolean
          example: false
        data:
          type: object
          nullable: true