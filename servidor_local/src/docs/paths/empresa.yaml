#paths/empresa.yaml

paths:
  /empresa:
    get:
      summary: Listar todos as empresas
      tags:
        - Empresa
      description: Retorna uma lista de todas as empresas disponiveis
      responses:
        "200":
          description: Lista de empresas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Empresa"
        "404":
          description: Empresa não encontrada
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroEmpresa"
  /empresa/create:
    post:
      summary: criar nova Empresa
      tags:
        - Empresa
      description: cria uma nova Empresa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/EmpresaCreate"
      responses:
        "200":
          description: Empresa criada com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucessoEmpresa"
        "400":
          description: Dados inválidos fornecidos
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroEmpresa"
  /empresa/get-by-id/{id}:
    get:
      summary: Buscar uma Empresa
      tags:
        - Empresa
      description: Retorna uma Empresa especifica pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID da Empresa a ser buscada
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Empresa encontrada
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucessoEmpresa"
        "404":
          description: Empresa não encontrada
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroEmpresa"
  /empresa/update/{id}:
    put:
      summary: atualizar uma Empresa
      tags:
        - Empresa
      description: Atualizar Categoria pelo id
      parameters:
        - name: id
          in: path
          required: true
          description: ID da Categoria a ser atualizada
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/CreateCategoria"
      responses:
        "200":
          description: Categoria atualizada com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucessoCategoria"
        "400":
          description: Dados inválidos fornecidos
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroCategoria"
        "404":
          description: Categoria não encontrada
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroCategoria"
  /category/delete/{id}:
    delete:
      summary: Deletar uma Categoria
      tags:
        - Category
      description: Deletar Categoria pelo id
      parameters:
        - name: id
          in: path
          required: true
          description: ID da Categoria a ser deletada
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Categoria deletada com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucessoCategoria"
        "404":
          description: Categoria não encontrada
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroCategoria"