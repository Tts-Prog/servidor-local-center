# schemas/proposta.yaml

#id: string
#id_prestacao_servico: number
#preco_hora: number
#horas_estimadas: number
#estado: string
#enabled: boolean
#created_at: string
#updated_at: string

components:
  schemas:
    Proposta:
      type: object
      properties:
        id:
          type: string
          example: "uuid-1234-5678"
        id_prestacao_servico:
          type: integer
          example: 10
        preco_hora:
          type: number
          format: float
          example: 50.5
        horas_estimadas:
          type: integer
          example: 8
        estado:
          type: string
          enum: [pendente, aceito, recusado, concluido]
          example: "pendente"
        enabled:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: "2023-10-27T09:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2023-10-27T10:00:00Z"
    GetProposta:
      type: object
      properties:
        id:
          type: string
          example: "uuid-1234-5678"
    CreateProposta:
      type: object
      required:
        - id_prestacao_servico
        - preco_hora
        - horas_estimadas
      properties:
        id_prestacao_servico:
          type: integer
          example: 10
        preco_hora:
          type: number
          format: float
          example: 50.0
        horas_estimadas:
          type: integer
          example: 5
        estado:
          type: string
          default: "pendente"
          example: "pendente"
        enabled:
          type: boolean
          default: true
          example: true
        id_prestador:
          type: string
          example: "uuid-1234-5678"
    UpdateProposta:
      type: object
      properties:
        preco_hora:
          type: number
          format: float
          example: 55.0
        horas_estimadas:
          type: integer
          example: 6
        estado:
          type: string
          example: "aceito"
        enabled:
          type: boolean
          example: true
    AceitarPoposta:
