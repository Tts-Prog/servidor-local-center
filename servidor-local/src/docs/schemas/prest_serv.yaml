# schemas/prest_serv.yaml

#id: string
#disign: string
#subtotal: number
#horas_estimadas: number
#id_prestador: string
#id_servico: number
#preco_hora: number
#estado: string
#id_orcamento: number
#enabled: boolean
#created_at: string
#updated_at: string

components:
  schemas:
    PrestacaoServico:
      type: object
      properties:
        id:
          type: string
          example: "uuid-456-789"
        disign:
          type: string
          example: "Manutenção Elétrica Industrial"
        subtotal:
          type: number
          format: float
          example: 450.00
        horas_estimadas:
          type: number
          example: 5
        id_prestador:
          type: string
          example: "uuid-prestador-123"
        id_servico:
          type: integer
          example: 1
        preco_hora:
          type: number
          format: float
          example: 90.00
        estado:
          type: string
          enum: [aberto, em_progresso, concluido, cancelado]
          example: "aberto"
        id_orcamento:
          type: integer
          example: 101
        enabled:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: "2026-03-27T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-27T11:00:00Z"

    CreatePrestacaoServico:
      type: object
      required:
        - disign
        - id_prestador
        - id_servico
        - preco_hora
      properties:
        disign:
          type: string
          example: "Limpeza de Fachada"
        subtotal:
          type: number
          format: float
          example: 450.00
        horas_estimadas:
          type: number
          example: 4
        id_prestador:
          type: string
          example: "uuid-prestador-123"
        id_servico:
          type: integer
          example: 2
        preco_hora:
          type: number
          example: 75.00
        id_orcamento:
          type: integer
          example: 102
        estado:
          type: string
          default: "aberto"
          example: "aberto"
        enabled:
          type: boolean
          default: true

    ResponseSucessoPrestacao:
      type: object
      properties:
        message:
          type: string
          example: "Prestação de serviço registrada com sucesso"
        status:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/PrestacaoServico"

    ResponseErroPrestacao:
      type: object
      properties:
        message:
          type: string
          example: "Erro ao processar prestação de serviço"
        status:
          type: boolean
          example: false
        data:
          type: object
          nullable: true