#paths/proposta.yaml

paths:
  /proposal:
    get:
      summary: Listar todos os propostas
      tags:
        - Proposal
      description: Retorna uma lista de todos os propostas disponiveis
      responses:
        "200":
          description: Lista de propostas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Proposta"
        "404":
          description: Serviço não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroProposta"
  /proposal/create:
    post:
      summary: criar novo serviço
      tags:
        - Proposal
      description: cria um novo serviço
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/CreateProposta"
      responses:
        "200":
          description: Serviço criado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucessoProposta"
        "400":
          description: Dados inválidos fornecidos
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroProposta"
  /proposal/get-by-id/{id}:
    get:
      summary: Buscar um serviço
      tags:
        - Proposal
      description: Retorna um serviço especifico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do serviço a ser buscado
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Serviço encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/GetProposta"
        "404":
          description: Serviço não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroProposta"
  /proposal/update/{id}:
    put:
      summary: atualizar um serviço
      tags:
        - Proposal
      description: Atualizar serviço pelo id
      parameters:
        - name: id
          in: path
          required: true
          description: ID do serviço a ser atualizado
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/CreateProposta"
      responses:
        "200":
          description: Serviço atualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucessoProposta"
        "400":
          description: Dados inválidos fornecidos
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroProposta"
        "404":
          description: Serviço não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroProposta"
  /proposal/aceitar/{id}:
    put:
      summary: Aceita uma proposta
      tags:
        - Proposal
      description: Aceita uma proposta
      parameters:
        - name: id
          in: path
          required: true
          description: ID da proposta a ser aceita
          schema:
            type: string
      responses:
        "200":
          description: Proposta aceite com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalResponse"
        "400":
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /proposal/delete/{id}:
    delete:
      summary: Deletar um serviço
      tags:
        - Proposal
      description: Deletar serviço pelo id
      parameters:
        - name: id
          in: path
          required: true
          description: ID do serviço a ser deletado
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Serviço deletado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucessoProposta"
        "404":
          description: Serviço não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroProposta"
  /proposal/get-by-user-id/{idUser}:
    get:
      summary: Buscar propostas de um utilizador
      tags:
        - Proposal
      description: Retorna as propostas de um utilizador especifico pelo ID
      parameters:
        - name: idUser
          in: path
          required: true
          description: ID do utilizador a ser buscado
          schema:
            type: string
            example: 1
      responses:
        "200":
          description: Propostas encontradas
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/GetProposta"
        "404":
          description: Serviço não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroProposta"