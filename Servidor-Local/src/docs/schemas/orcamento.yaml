# schema/orcamento.yaml

components:
  schemas:

    orcamento:
      type: object
      properties:
        id:
          type: integer
          example: 1
        total:
          type: number
          example: 200.0
        id_utilizador:
          type: string
          example: "e54f3cee-4997-49fc-ace8-833d0884b8cc"
        enabled:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: "2026-03-11T10:01:12.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-11T10:01:12.000Z"

    # schema para criar um novo orçamento
    CreateOrcamento:
      type: object
      properties:
        total:
          type: number
          example: 200.0
        id_utilizador:
          type: string
          example: "e54f3cee-4997-49fc-ace8-833d0884b8cc"
        enabled:
          type: boolean
          example: true
      required:
        - total
        - id_utilizador
        - enabled

    # schema para calcular um orçamento
    CalcularOrcamentoResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Orçamento calculado com sucesso
        data:
          type: object
        properties:
        total:
          type: number
          example: 15000

    # schema genérico para sucesso
    orcamentoResponseSucesso:
      type: object
      properties:
        message:
          type: string
          example: Orçamento criado com sucesso
        status:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/orcamento"

    # schema genérico de erro
    orcamentoResponseErro:
      type: object
      properties:
        message:
          type: string
          example: Erro ao processar a requisição
        status:
          type: boolean
          example: false
        data:
          type: object
          null: true