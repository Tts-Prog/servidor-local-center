# schema/user.yaml

components:
  schemas:

    user:
      type: object
      properties:
        id:
          type: string
          example: "4bb7ab97-8c95-4c85-9571-193e7efdc359"
        nome:
          type: string
          example: Kleber Veiga
        numero_identificado:
          type: string
          example: M002Y
        data_nascimento:
          type: string
          format: date
          example: "1997-10-31"
        email:
          type: string
          format: email
          example: klebercorreia532@gmail.com
        telefone:
          type: string
          example: "5863452"
        pais:
          type: string
          example: CV
        localidade:
          type: string
          example: Praia
        password:
          type: string
          example: "********"
        enabled:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: "2026-03-13T10:03:34.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-13T10:03:34.000Z"

    # schema para criar um novo utilizador
    CreateUser:
      type: object
      properties:
        nome:
          type: string
          example: Kleber Veiga
        numero_identificado:
          type: string
          example: M002Y
        data_nascimento:
          type: string
          format: date
          example: "1997-10-31"
        email:
          type: string
          format: email
          example: klebercorreia532@gmail.com
        telefone:
          type: string
          example: "5863452"
        pais:
          type: string
          example: CV
        localidade:
          type: string
          example: Praia
        password:
          type: string
          example: "Baixadabxd123#"
        enabled:
          type: boolean
          example: true
      required:
        - nome
        - numero_identificado
        - data_nascimento
        - email
        - password
        - enabled

    loginUser:
      type: object
      properties:
        email:
          type: string
          format: email
          example: klebercorreia532@gmail.com
        password:
          type: string
          example: "Baixadabxd123#"
  

    # schema genérico para sucesso
    userResponseSucesso:
      type: object
      properties:
        message:
          type: string
          example: Utilizador criado com sucesso
        status:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/user"


    # schema genérico de erro
    userResponseErro:
      type: object
      properties:
        message:
          type: string
          example: Erro ao processar a requisição
        status:
          type: boolean
          example: false
        data:
          type: object
          null: true