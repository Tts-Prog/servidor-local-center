# paths/prestador.yaml

paths:
  /prestadores:
    get:
      summary: Listar todos os prestadores
      tags:
        - Prestadores
      description: Retorna a lista de todos os prestadores disponíveis
      responses:
        "200":
          description: Lista de prestadores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/prestador"

        "404":
          description: Prestador não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responseErro"

  /prestador/create:
    post:
      summary: Criar um novo prestador
      tags:
        - Prestadores
      description: Criar um novo prestador
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePrestador"
      responses:
        "200":
          description: Prestador criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responseSucesso"

        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
              $ref: "#/components/schemas/responseErro"


  /prestador/get-by-id/{id}:
    get:
      summary: Buscar um prestador por ID
      tags:
        - Prestadores 
      description: Retorna um prestador específico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do prestador
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Prestador encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/prestador"

        "404":
          description: Prestador não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responseErro"

  /prestador/update/{id}:
    put:
      summary: Atualizar um prestador
      tags:
        - Prestadores
      description: Atualiza um prestador existente pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do prestador
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePrestador"
      responses:
        "200":
          description: Atualizado com sucesso
          content:
            application/json:
              schema:
              $ref: "#/components/schemas/prestador"

        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responseErro"

        "404":
          description: Prestador não encontrado
          content:
            application/json:
              schema:
              $ref: "#/components/schemas/responseErro"

  /prestador/delete/{id}:
    delete:
      summary: Deletar um prestador
      tags:
        - Prestadores
      description: Deleta um prestador específico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do prestador
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Prestador deletado com sucesso
          content:
            application/json:
              schema:
              $ref: "#/components/schemas/responseSucesso"

        "404":
          description: Prestador não encontrado
          content:
            application/json:
              schema:
              $ref: "#/components/schemas/responseErro"