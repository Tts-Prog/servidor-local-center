# paths/user.yaml

paths:
  /users:
    get:
      summary: Listar todos os usuários
      tags:
        - Usuários  
      description: Retorna a lista de todos os usuários disponíveis
      responses:
        "200":
          description: Lista de usuários
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/user"

        "404":
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responseErro"

  /user/create:
    post:
      summary: Criar um novo usuário
      tags:
        - Usuários
      description: Criar um novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUser"
      responses:
        "200":
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
              $ref: "#/components/schemas/responseSucesso"

        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
              $ref: "#/components/schemas/responseErro"

  /user/get-by-id/{id}:
    get:
      summary: Buscar um usuário por ID
      tags:
        - Usuários
      description: Retorna um usuário específico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do usuário
          schema:
            type: string
            example: "4bb7ab97-8c95-4c85-9571-193e7efdc359"
      responses:
        "200":
          description: Usuário encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/user"

        "404":
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responseErro"

  /user/update/{id}:
    put:
      summary: Atualizar um usuário
      tags:
        - Usuários
      description: Atualiza um usuário existente pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do usuário
          schema:
            type: string
            example: "4bb7ab97-8c95-4c85-9571-193e7efdc359"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUser"
      responses:
        "200":
          description: Atualizado com sucesso
          content:
            application/json:
              schema:
              $ref: "#/components/schemas/user"

        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responseErro"

        "404":
          description: Usuário não encontrado
          content:
            application/json:
              schema:
              $ref: "#/components/schemas/responseErro"

  /user/delete/{id}:
    delete:
      summary: Deletar um usuário
      tags:
        - Usuários  
      description: Deleta um usuário específico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do usuário
          schema:
            type: string
            example: "4bb7ab97-8c95-4c85-9571-193e7efdc359"
      responses:
        "200":
          description: Usuário deletado com sucesso
          content:
            application/json:
              schema:
              $ref: "#/components/schemas/responseSucesso"

        "404":
          description: Usuário não encontrado
          content:
            application/json:
              schema:
              $ref: "#/components/schemas/responseErro"

/user/login:
  post:
    summary: Login de usuário
    tags:
      - Usuários
    description: Realiza o login de um usuário
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/loginUser"
    responses:
      "200":
        description: Login bem-sucedido
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/responseSucesso"
      "404":
        description: "Erro ao realizar login"
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/responseErro" 
      "400":
        description: "Dados de login inválidos"
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/responseErro"
