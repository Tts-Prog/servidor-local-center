# paths/orcamento.yaml

paths:
  /orcamento:
    get:
      summary: Listar todos os orçamentos
      tags:
        - Orçamentos
      description: Retorna a lista de todos os orçamentos disponíveis
      responses:
        "200":
          description: Lista de orçamentos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/orcamento"

        "404":
          description: Orçamento não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responseErro"

  /orcamento/create:
    post:
      summary: Criar um novo orçamento
      tags:
        - Orçamentos
      description: Criar um novo orçamento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrcamento"
      responses:
        "200":
          description: Orçamento criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responseSucesso"

        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responseErro"

  /orcamento/get-by-id/{id}:
    get:
      summary: Buscar um orçamento por ID
      tags:
        - Orçamentos
      description: Retorna um orçamento específico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do orçamento
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Orçamento encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/orcamento"

        "404":
          description: Orçamento não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responseErro"

  /orcamento/update/{id}:
    put:
      summary: Atualizar um orçamento
      tags:
        - Orçamentos
      description: Atualiza um orçamento existente pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do orçamento
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrcamento"
      responses:
        "200":
          description: Atualizado com sucesso
          content:
            application/json:
              schema:
              $ref: "#/components/schemas/orcamento"

        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responseErro"

        "404":
          description: Orçamento não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responseErro"

/orcamento/{id}/calcular:
  put:
    summary: Calcular total do orçamento
    tags:
      - Orçamentos
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: ID do orçamento
    responses:
      200:
        description: Total calculado com sucesso
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalcularOrcamentoResponse"

      404:
        description: Orçamento não encontrado
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"

      500:
        description: Erro interno
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponse"
  /orcamento/delete/{id}:
    delete:
      summary: Deletar um orçamento
      tags:
        - Orçamentos
      description: Deleta um orçamento específico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do orçamento
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Orçamento deletado com sucesso
          content:
            application/json:
              schema:
              $ref: "#/components/schemas/responseSucesso"

        "404":
          description: Orçamento não encontrado
          content:
            application/json:
              schema:
              $ref: "#/components/schemas/responseErro"
