# schema/servico.yaml

    #id: string,
    #nome: string,
    #descricao: string,
    #categoria: string,
    #enabled: boolean;
    #created_at: string,
    #updated_at: string

components:
  schemas:
  # schema principal de serviço
    Servico:
      type: object
      properties:
        id:
          type: integer
          exemple: 1
        nome:
          type: string
          example: "Serviço de Limpeza"
        descricao:
          type: string
          example: "Serviço de limpeza profissional para residênçia"
        categoria:
          type: string
          example: "Limpeza"
        enabled:
          type: "booleean"
          example: true
        created_at:
          type: string
          example: "2022-01-01T00:00:00.0002"
        updated_at:
          type: string
          example: "2022-01-01T00:00:00.0002"

    #schema para criar um novo serviço
    CreateService:
      type: object
      properties:
        nome:
          type: string
          example: Serviço de limpeza
        descricao:
          type: string
          example: "Servico de limpeza profissional para residêcia e empresa "
        categoria:
          type: string
          example: "Limpeza"
        enabled:
          type: "booleean"
          example: true

    # schema generico para sucesso
    ResponseSucess:
      type: object
      properties:
        message:
          type: string
          example: "servico criado com sucesso"
        status:
          type: boolean
          example: true
        data:
          type: object
          $ref: "#/components/schemas/Servico"

    #schema generico de resposta de erro
    ResponseError:
      type: object
      properties:
        message:
          type: string
          exemple: "Erro ao buscar serviços"
        status:
          type: boolean
          properties:
            null:

    #schema para buscar servico detalhado
    ServicoDetalhado:
    type: object
    properties:
      id:
        type: integer
        example: 1
      nome:
        type: string
        example: "Serviço de limpeza"
      descricao:
        type: string
        example: "Serviço de limpeza profissional para residências e empresas."
      designacao_categoria:
        type: string
        example: "Limpeza"
      icone_categoria:
        type: string
        example: ""
      id_empresa:
        type: string
        example: 1
      designacao_empresa:
        type: string
        example: "Empresa de limpeza"
      icone_empresa:
        type: string
        example: ""
      enabled:
        type: string
        example: true