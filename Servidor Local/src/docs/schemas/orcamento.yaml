# schema/orcamento.yaml

    #id: string,
    #nome: string,
    #descricao: string,
    #categoria: string,
    #enabled: boolean;
    #created_at: string,
    #updated_at: string

components:
  schemas:
  # schema principal de orcamento
    Orcamento:
      type: object
      properties:
        id:
          type: integer
          exemple: 1
        nome:
          type: string
          example: "Orcamento de Limpeza"
        descricao:
          type: string
          example: "Orcamento de limpeza profissional para residênçia"
        categoria:
          type: string
          example: "Limpeza"
        enabled:
          type: "booleean"
          example: true
        created_at:
          type: string
          example: "2022-01-01T00:00:00.0002"
        updated_at:
          type: string
          example: "2022-01-01T00:00:00.0002"

    #schema para criar um novo orcamento
    CreateService:
      type: object
      properties:
        nome:
          type: string
          example: Orcamento de limpeza
        descricao:
          type: string
          example: "Orcamento de limpeza profissional para residêcia e empresa "
        categoria:
          type: string
          example: "Limpeza"
        enabled:
          type: "booleean"
          example: true

    # schema generico para sucesso
    ResponseSucess:
      type: object
      properties:
        message:
          type: string
          example: "orcamento criado com sucesso"
        status:
          type: boolean
          example: true
        data:
          type: object
          $ref: "#/components/schemas/Orcamento"

    #schema generico de resposta de erro
    ResponseError:
      type: object
      properties:
        message:
          type: string
          exemple: "Erro ao buscar orcamento"
        status:
          type: boolean
          properties:
            null: