# schema/user.yaml

    #id: string,
    #nome: string,
    #descricao: string,
    #categoria: string,
    #enabled: boolean;
    #created_at: string,
    #updated_at: string

components:
  schemas:
  # schema principal de user
    User:
      type: object
      properties:
        id:
          type: integer
          exemple: 1
        nome:
          type: string
          example: "User de Limpeza"
        descricao:
          type: string
          example: "User de limpeza profissional para residênçia"
        categoria:
          type: string
          example: "Limpeza"
        enabled:
          type: "booleean"
          example: true
        created_at:
          type: string
          example: "2022-01-01T00:00:00.0002"
        updated_at:
          type: string
          example: "2022-01-01T00:00:00.0002"

    #schema para criar um novo user
    CreateService:
      type: object
      properties:
        nome:
          type: string
          example: User de limpeza
        descricao:
          type: string
          example: "User de limpeza profissional para residêcia e empresa "
        categoria:
          type: string
          example: "Limpeza"
        enabled:
          type: "booleean"
          example: true

          LoginUser:
            type: object
            properties:
              email:
                type: string
                example: "user@example.com"
              password:
                type: string
                example: "senha123"

    # schema generico para sucesso
    ResponseSucess:
      type: object
      properties:
        message:
          type: string
          example: "user criado com sucesso"
        status:
          type: boolean
          example: true
        data:
          type: object
          $ref: "#/components/schemas/User"

    #schema generico de resposta de erro
    ResponseError:
      type: object
      properties:
        message:
          type: string
          exemple: "Erro ao buscar user"
        status:
          type: boolean
          properties:
            null: