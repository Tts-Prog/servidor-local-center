# paths/servico.yaml

paths:
  /servico:
    get:
      summary: listar todos os serviços
      tags:
        -Servico
      description: Retomar uma lista de todos os serviços disponíveis
    response:
      "200":
        description: Lista de serviços
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Servico"
        "404":
          description: "Nenhum serciço encontrado"
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseError"

  /service/create:
    post:
      summary: Criar um novo servico
      tags:
        -Servico
      description: Criar um novo servico
      requestBody:
        required: true
        content:
          application/json:
            schemas:
              type: object
              $ref: "#/components/schemas/createService"
      Responses:
        "200":
          description: Serviço criado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucess"
        "400":
          description: Serviço criado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResposeError"

  /service/get-by-id/{id}:
    get:
      summary: Buscar um serviço por ID
      tags:
        -Servico
      description: Retomar um serviço especifico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do utilizador
          schema:
            type: integer
            example: 1
      Response:
        "200":
          description: Serviço encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/Servico"
        "404":
          description: Servico não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResposeError"

  /service/update/{id}:
    put:
      summary: Atualizar um serviço
      tags:
        -Servico
      description: Atualiza um serviço especifico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do serviço a ser atualizado
          schema:
            type: integer
            example: 1
      RequestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/CreateService"
      Responses:
        "200":
          description: Dados invalidos
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSuccess"
        "404":
          description: Serviço não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResposeError"

  /service/delete/{id}:
    delete:
      summary: Apagar um serviço
      tags:
        -Servico
      description: Apagar um serviço especifico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do serviço a ser apagado
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Serviço apagado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSuccess"
        "404":
          description: Serviço não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResposeError"

  /service/all-detailed:
    get:
      summary: Apagar um serviço
      tags:
        -Servico
      description: Retomar uma lista de todos os serviços disponíveis com detalhes
      parameters:
        - name: limit
          in: query
          required: false
          description: Limite de serviços a serem retomados
          schema:
            type: integer
            example: 10
        - name: offset
          in: query
          required: false
          description: Offset de serviços a serem retomados
          schema:
            type: integer
            example: 0
      responses:
        "200":
          description: Lista de servoços detalhados
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/servicoDetalhado"
        "404":
          description: Nenhum serviço encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/servicoDetalhado"

  