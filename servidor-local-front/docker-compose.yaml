services:
  api:
    build: ../servidor_local
    container_name: servidor_local
    ports:
      - 8080:8080
    networks:
      - marketplace_net
    environment:
      - PORT=8080
      - NODE_ENV=development
  web: 
    build: 
      context: .
    container_name: "servidor_local_front"
    ports:
      - "3000:3000"
    networks:
      - "marketplace_net"
    depends_on:
      - api
    environment:
      - PORT=3000
      - NEXT_PUBLIC_DATA_API_URL=http://api:8080/graphql
      - NEXT_PUBLIC_AUTH_API_URL=http://api:8080/


networks:
  marketplace_net:
    driver: bridge