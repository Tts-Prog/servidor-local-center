# id: string,
# taxa_urgencia: number,
# percentagem_desconto: number,
# minimo_desconto: number,
# nif: string,
# profissao: string,
# enable: boolean,
# created_at: string,
# updated_at: string

components:
  schemas:
    Prestador:
      type: object
      properties:
        id:
          type: string
          example: "1"
        taxa_urgencia:
          type: number
          example: 10
        percentagem_desconto:
          type: number
          example: 10
        minimo_desconto:
          type: number
          example: 10
        nif:
          type: string
          example: "123456789"
        profissao:
          type: string
          example: "Engenheiro"
        enable:
          type: boolean
          example: true
        created_at:
          type: string
          example: "2022-01-01T00:00:00.000Z"
        updated_at:
          type: string
          example: "2022-01-01T00:00:00.000Z"

    CreatePrestador:
      type: object
      properties:
        taxa_urgencia:
          type: number
          example: 10
        percentagem_desconto:
          type: number
          example: 10
        minimo_desconto:
          type: number
          example: 10
        nif:
          type: string
          example: "123456789"
        profissao:
          type: string
          example: "Engenheiro"
        enable:
          type: boolean
          example: true

    ResponseSuccess:
      type: object
      properties:
        message:
          type: string
          example: "Prestador criado com sucesso"
        status:
          type: boolean
          example: true
        data:
          type: object
          $ref: "#/components/schemas/Prestador"

    ResponseError:
      type: object
      properties:
        message:
          type: string
          example: "Erro ao buscar prestadores"
        status:
          type: boolean
          example: false
        data:
          type: object
          properties: null