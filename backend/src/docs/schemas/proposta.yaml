# id: string,
# id_prestacao_servico: string,
# preco_hora: number,
# horas_estimadas: number,
# estado: string,
# enabled: boolean,
# created_at: string,
# updated_at: string

components:
  schemas:
    Proposta:
      type: object
      properties:
        id:
          type: string
          example: "1"
        id_prestacao_servico:
          type: string
          example: "1"
        preco_hora:
          type: number
          example: 100
        horas_estimadas:
          type: number
          example: 10
        estado:
          type: string
          example: "pendente"
        enabled:
          type: boolean
          example: true
        created_at:
          type: string
          example: "2022-01-01T00:00:00.000Z"
        updated_at:
          type: string
          example: "2022-01-01T00:00:00.000Z"

    CreateProposta:
      type: object
      properties:
        id_prestacao_servico:
          type: string
          example: "1"
        preco_hora:
          type: number
          example: 100
        horas_estimadas:
          type: number
          example: 10
        estado:
          type: string
          example: "pendente"
        enabled:
          type: boolean
          example: true

    UpdateProposta:
      type: object
      properties:
        id_prestacao_servico:
          type: string
          example: "1"
        preco_hora:
          type: number
          example: 100
        horas_estimadas:
          type: number
          example: 10
        estado:
          type: string
          example: "pendente"
        enabled:
          type: boolean
          example: true

    AceitarResposta:
      type: object
      properties:
        estado:
          type: string
          example: "Aceitado | Rejeitado | Pendente"
        id_prestacao_servico:
          type: string
          example: "1"